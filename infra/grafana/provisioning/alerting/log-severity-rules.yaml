apiVersion: 1

groups:
  - orgId: 1
    name: log-severity-monitoring
    folder: Provisioned Alerts
    interval: 1m
    rules:
      - uid: logs-errors-any-service
        title: "[Logs] Errors in any service > 0 (5m)"
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Error-level logs detected in the last 5 minutes."
          runbook_url: "docs/deployment_wsl2.md#7-логирование-и-мониторинг-полный-контур"
        labels:
          severity: critical
          source: loki
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: sum by (service) (count_over_time({service=~".+"} |~ "(?i)\\b(error|err|exception|fatal|critical)\\b" [5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              refId: B
              type: classic_conditions

      - uid: logs-warnings-burst-any-service
        title: "[Logs] Warning burst in any service > 20 (10m)"
        condition: B
        for: 10m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Warning-level log burst detected in the last 10 minutes."
          runbook_url: "docs/deployment_wsl2.md#7-логирование-и-мониторинг-полный-контур"
        labels:
          severity: warning
          source: loki
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: sum by (service) (count_over_time({service=~".+"} |~ "(?i)\\b(warn|warning)\\b" [10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 20
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              refId: B
              type: classic_conditions

      - uid: logs-error-spike-any-service
        title: "[Logs] Error spike in any service > 15 (5m)"
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "Potential error spike detected (more than 15 error logs in 5 minutes)."
          runbook_url: "docs/deployment_wsl2.md#9-диагностика-проблем"
        labels:
          severity: critical
          source: loki
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: sum by (service) (count_over_time({service=~".+"} |~ "(?i)\\b(error|err|exception|fatal|critical)\\b" [5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 15
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              refId: B
              type: classic_conditions
